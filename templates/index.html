<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask App - Real-time Streaming with File Upload</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
    <h1>Enter a prompt and upload a file (optional)</h1>

    <form method="post" enctype="multipart/form-data">
        <input type="text" name="user_input" placeholder="Enter your input">
        <input type="file" name="file">
        <button type="submit">Submit</button>
    </form>

    {% if download_link %}
    <a href="{{ url_for('uploads', filename=download_link) }}" download>Download Response</a>
    {% endif %}
</body>

</html>
