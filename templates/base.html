<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Council - {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header>
        <h1><a class="logo-button" href="{{ url_for('index') }}">E-Council</a></h1>

        <nav>
            <ul>
                <li><a class="text-button" href="{{ url_for('index') }}">Home</a></li>
                <li><a class="secondary-button" href="{{ url_for('login') }}">Log In</a></li>
                <li><a class="primary-button" href="{{ url_for('signup') }}">Sign Up</a></li>
            </ul>
        </nav>
    </header>
    {% block content %}{% endblock %}
</body>
</html>
