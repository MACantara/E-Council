<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="theme-color" content="#0891b2">
    <title>E-Council - {% block title %}Home{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function () {
            const stored = localStorage.getItem('theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (stored === 'dark' || (!stored && systemDark)) {
                document.documentElement.classList.add('dark');
            } else if (stored === 'light') {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @import "tailwindcss";
        @theme {
            --color-surface-bg: #f8fafc;
            --color-surface: #ffffff;
            --color-surface-lowered: #f1f5f9;
            --color-ink: #0f172a;
            --color-ink-2: #475569;
            --color-ink-3: #94a3b8;
            --color-edge: #e2e8f0;
            --color-accent: #0891b2;
            --color-accent-hover: #0e7490;
            --color-danger: #e11d48;
            --color-danger-hover: #be123c;
            --color-success: #059669;
            --color-success-hover: #047857;
            --color-warning: #f59e0b;
            --color-warning-hover: #d97706;
            --color-info: #2563eb;
            --color-info-hover: #1d4ed8;
            --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
        }
        .dark {
            --color-surface-bg: #020617;
            --color-surface: #0f172a;
            --color-surface-lowered: #1e293b;
            --color-ink: #f8fafc;
            --color-ink-2: #cbd5e1;
            --color-ink-3: #64748b;
            --color-edge: #334155;
            --color-accent: #06b6d4;
            --color-accent-hover: #22d3ee;
            --color-danger: #f43f5e;
            --color-danger-hover: #fb7185;
            --color-success: #10b981;
            --color-success-hover: #34d399;
            --color-warning: #fbbf24;
            --color-warning-hover: #f59e0b;
            --color-info: #3b82f6;
            --color-info-hover: #60a5fa;
        }
        html { color-scheme: light; }
        html.dark { color-scheme: dark; }
    </style>
    <style>
        :root {
            --primary-text-color: #0f172a;
            --chart-font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
            --chart-font-size: 12px;
            --chart-font-weight: 500;
            --remaining-budget-color: #059669;
            --expenses-within-budget-color: #e11d48;
            --expenses-over-budget-color: #be123c;
            --expense-color-1: #7f1d1d;
            --expense-color-2: #b91c1c;
            --expense-color-3: #ef4444;
            --expense-color-4: #f87171;
            --expense-color-5: #fca5a5;
            --income-color-1: #064e3b;
            --income-color-2: #059669;
            --income-color-3: #10b981;
            --income-color-4: #34d399;
            --income-color-5: #6ee7b7;
        }

        .dark {
            --primary-text-color: #f8fafc;
            --remaining-budget-color: #34d399;
            --expenses-within-budget-color: #f43f5e;
            --expenses-over-budget-color: #fb7185;
            --expense-color-1: #fca5a5;
            --expense-color-2: #f87171;
            --expense-color-3: #ef4444;
            --expense-color-4: #b91c1c;
            --expense-color-5: #7f1d1d;
            --income-color-1: #6ee7b7;
            --income-color-2: #34d399;
            --income-color-3: #10b981;
            --income-color-4: #059669;
            --income-color-5: #064e3b;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen flex flex-col bg-surface-bg text-ink antialiased font-sans">
    {% include "partials/navbar.html" %}
    {% include "partials/flash_messages.html" %}
    <main class="flex-1 w-full">
        {% block content %}{% endblock %}
    </main>
    {% include "partials/footer.html" %}
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/navbar.js') }}"></script>
    <script src="{{ url_for('static', filename='js/charts-theme.js') }}"></script>
    <script>
        window.addEventListener('load', function () {
            if (window.lucide) lucide.createIcons();
        });
    </script>
    {% block script %}{% endblock %}
</body>
</html>
