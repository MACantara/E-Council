{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}

<div class="container">
    <h2>Reset Your Password</h2>

    <p>Enter your email address and we will send you a link to reset your password.</p>

    <form method="POST">
        <div class="input-pair">
            <label for="users-email">Email</label>
            <input type="email" name="users-email" id="users-email" placeholder="Enter your email" required>
        </div>

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="horizontal-input-pair">
            <a class="secondary-button" href="{{ url_for('auth.login') }}">Back</a>
            <button class="primary-button" type="submit">Reset Password</button>
        </div>
    </form>
</div>

{% endblock %}
