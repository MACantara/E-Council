{% macro button(text, href, color='#0891b2') %}
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:16px 0;">
    <tr>
        <td align="center" bgcolor="{{ color }}" style="border-radius:8px;">
            <a href="{{ href }}" style="display:inline-block; padding:12px 24px; color:#ffffff; text-decoration:none; font-weight:600; border-radius:8px;">{{ text }}</a>
        </td>
    </tr>
</table>
{% endmacro %}
