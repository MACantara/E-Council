name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SECRET_KEY: ci-secret-key
  SQLALCHEMY_DATABASE_URI: sqlite:///test.db
  FASTAPI_DATABASE_URI: sqlite:///fastapi_test.db
  MAIL_DEFAULT_SENDER: test@example.com
  AI_PROVIDER: mock
  EMAIL_PROVIDER: memory
  STORAGE_PROVIDER: memory

jobs:
  lint-format-typecheck-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build CSS bundle
        run: npm run build:css

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Check frontend formatting
        working-directory: frontend
        run: npm run format:check

      - name: Install Playwright browsers
        working-directory: frontend
        run: npm run e2e:install

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npm run e2e

      - name: Verify migrations
        env:
          FLASK_APP: app.py
        run: |
          flask db upgrade
          flask db downgrade base
          flask db upgrade

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format
        run: ruff format --check .

      - name: Run mypy
        run: mypy

      - name: Run pytest
        run: pytest -q

      - name: Smoke test WSGI
        env:
          SECRET_KEY: ci-secret-key
          SQLALCHEMY_DATABASE_URI: sqlite:///test.db
          MAIL_DEFAULT_SENDER: test@example.com
        run: |
          gunicorn -w 2 -b 127.0.0.1:8000 wsgi:application > /tmp/gunicorn.log 2>&1 &
          sleep 3
          curl -f http://127.0.0.1:8000/ || (cat /tmp/gunicorn.log && exit 1)
          kill %1

      - name: Smoke test FastAPI
        env:
          SECRET_KEY: ci-secret-key
          FASTAPI_DATABASE_URI: sqlite:///fastapi_test.db
          MAIL_DEFAULT_SENDER: test@example.com
          AI_PROVIDER: mock
          EMAIL_PROVIDER: memory
          STORAGE_PROVIDER: memory
        run: |
          uvicorn api.main:app --host 127.0.0.1 --port 8001 > /tmp/uvicorn.log 2>&1 &
          sleep 3
          curl -f http://127.0.0.1:8001/ || (cat /tmp/uvicorn.log && exit 1)
          curl -f http://127.0.0.1:8001/health || (cat /tmp/uvicorn.log && exit 1)
          curl -f http://127.0.0.1:8001/docs || (cat /tmp/uvicorn.log && exit 1)
          kill %1
